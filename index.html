<script type="module">

function generatePlist({ name, ipaUrl, bundleId, version }) {
  return `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
 "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>items</key>
  <array>
    <dict>
      <key>assets</key>
      <array>
        <dict>
          <key>kind</key>
          <string>software-package</string>
          <key>url</key>
          <string>${ipaUrl}</string>
        </dict>
      </array>

      <key>metadata</key>
      <dict>
        <key>bundle-identifier</key>
        <string>${bundleId}</string>

        <key>bundle-version</key>
        <string>${version}</string>

        <key>kind</key>
        <string>software</string>

        <key>title</key>
        <string>${name}</string>
      </dict>
    </dict>
  </array>
</dict>
</plist>`;
}

// 📦 Download plist
function downloadPlist(content, name) {
  const blob = new Blob([content], { type: "text/xml" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = name + ".plist";
  a.click();
}

// 📤 AUTO PUBLISH WITH PLIST
window.publish = async function () {

  const name = document.getElementById("name").value;
  const iconFile = document.getElementById("icon").files[0];
  const ipaUrl = document.getElementById("plist").value; 
  const price = document.getElementById("price").value;

  if (!name || !iconFile || !ipaUrl) {
    alert("Fill all fields");
    return;
  }

  const reader = new FileReader();

  reader.onload = async () => {

    // 🧠 Generate bundle id automatically
    const bundleId = "com." + name.toLowerCase().replace(/\s/g, "");

    // 🔥 Create plist automatically
    const plist = generatePlist({
      name,
      ipaUrl,
      bundleId,
      version: "1.0"
    });

    // 📥 Download plist instantly
    downloadPlist(plist, name);

    // Store app in Firebase (if you already connected it)
    await addDoc(collection(db, "apps"), {
      name,
      icon: reader.result,
      plist: ipaUrl,
      price
    });

    alert("App published + plist generated!");
    loadApps();
  };

  reader.readAsDataURL(iconFile);
};

</script>
