<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IPA Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  background: #111;
  font-weight: bold;
}

.search {
  padding: 10px;
  width: 90%;
  margin: 15px auto;
  display: block;
  border-radius: 10px;
  border: none;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
  padding: 15px;
}

.app {
  background: #1a1a1a;
  border-radius: 15px;
  padding: 10px;
  text-align: center;
  transition: 0.2s;
}

.app:hover {
  transform: scale(1.05);
}

.app img {
  width: 80px;
  height: 80px;
  border-radius: 20px;
}

button {
  margin-top: 10px;
  padding: 8px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #0a84ff;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<header>📱 IPA Store</header>

<input class="search" placeholder="Search apps..." onkeyup="searchApps(this.value)">

<div class="container" id="apps"></div>

<script>
// 🔧 EDIT THIS: your apps list
const apps = [
  {
    name: "My App",
    icon: "https://via.placeholder.com/100",
    plist: "https://yourdomain.com/app.plist"
  },
  {
    name: "Game Hack",
    icon: "https://via.placeholder.com/100",
    plist: "https://yourdomain.com/game.plist"
  }
];

const container = document.getElementById("apps");

function renderApps(list) {
  container.innerHTML = "";
  list.forEach(app => {
    const div = document.createElement("div");
    div.className = "app";

    div.innerHTML = `
      <img src="${app.icon}">
      <h3>${app.name}</h3>
      <button onclick="install('${app.plist}')">Install</button>
    `;

    container.appendChild(div);
  });
}

function install(plist) {
  window.location.href =
    "itms-services://?action=download-manifest&url=" +
    encodeURIComponent(plist);
}

function searchApps(query) {
  const filtered = apps.filter(a =>
    a.name.toLowerCase().includes(query.toLowerCase())
  );
  renderApps(filtered);
}

// Load apps
renderApps(apps);
</script>

</body>
</html>
