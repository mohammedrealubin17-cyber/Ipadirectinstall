<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPA App Store</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: #0f0f0f;
    color: white;
  }

  header {
    padding: 20px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    background: #1c1c1e;
  }

  .container {
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
  }

  .app-card {
    background: #1c1c1e;
    border-radius: 20px;
    padding: 15px;
    text-align: center;
    transition: 0.2s;
  }

  .app-card:hover {
    transform: scale(1.05);
  }

  .app-icon {
    width: 100px;
    height: 100px;
    border-radius: 22px;
    margin-bottom: 10px;
  }

  .app-title {
    font-size: 18px;
    margin-bottom: 5px;
  }

  .app-desc {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 10px;
  }

  .install-btn {
    background: #0a84ff;
    border: none;
    padding: 10px;
    border-radius: 12px;
    color: white;
    font-size: 14px;
    cursor: pointer;
  }

  .install-btn:hover {
    background: #409cff;
  }
</style>
</head>

<body>

<header>📱 IPA App Store</header>

<div class="container">

  <!-- APP 1 -->
  <div class="app-card">
    <img class="app-icon" src="https://via.placeholder.com/100">
    <div class="app-title">My App</div>
    <div class="app-desc">Cool IPA app</div>
    <button class="install-btn"
      onclick="install('https://yourdomain.com/app.plist')">
      Install
    </button>
  </div>

  <!-- APP 2 -->
  <div class="app-card">
    <img class="app-icon" src="https://via.placeholder.com/100">
    <div class="app-title">Game App</div>
    <div class="app-desc">Fun game IPA</div>
    <button class="install-btn"
      onclick="install('https://yourdomain.com/game.plist')">
      Install
    </button>
  </div>

</div>

<script>
function install(plistURL) {
  window.location.href =
    "itms-services://?action=download-manifest&url=" +
    encodeURIComponent(plistURL);
}
</script>

</body>
</html>
