<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IPA Store Upload System</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  background: #111;
  font-size: 22px;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 15px;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 15px;
}

input, select, button {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #0a84ff;
  color: white;
  font-weight: bold;
}

.app {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 15px;
  margin-bottom: 10px;
  text-align: center;
}

img {
  width: 70px;
  height: 70px;
  border-radius: 15px;
}
</style>
</head>

<body>

<header>📱 IPA Store (Image Upload Enabled)</header>

<div class="container">

  <!-- UPLOAD PANEL -->
  <div class="card">
    <h3>Publish App</h3>

    <input id="name" placeholder="App Name">

    <input type="file" id="icon" accept="image/*">

    <input id="plist" placeholder="Plist URL (direct install)">

    <select id="price">
      <option value="0">Free</option>
      <option value="1">Paid $1</option>
      <option value="5">Paid $5</option>
    </select>

    <button onclick="publish()">Publish App</button>
  </div>

  <!-- STORE -->
  <div class="card">
    <h3>Store</h3>
    <div id="store"></div>
  </div>

</div>

<script>

let apps = JSON.parse(localStorage.getItem("apps") || "[]");

// Convert image to base64
function toBase64(file, callback) {
  const reader = new FileReader();
  reader.onload = () => callback(reader.result);
  reader.readAsDataURL(file);
}

function publish() {

  const name = document.getElementById("name").value;
  const plist = document.getElementById("plist").value;
  const price = document.getElementById("price").value;
  const iconFile = document.getElementById("icon").files[0];

  if (!iconFile) {
    alert("Please select an icon image");
    return;
  }

  toBase64(iconFile, (iconBase64) => {

    const app = {
      name,
      plist,
      price,
      icon: iconBase64
    };

    apps.push(app);
    localStorage.setItem("apps", JSON.stringify(apps));

    render();
  });
}

function install(plist) {
  window.location.href =
    "itms-services://?action=download-manifest&url=" +
    encodeURIComponent(plist);
}

function render() {
  const store = document.getElementById("store");
  store.innerHTML = "";

  apps.forEach(app => {
    const div = document.createElement("div");
    div.className = "app";

    div.innerHTML = `
      <img src="${app.icon}">
      <h3>${app.name}</h3>
      <p>${app.price == 0 ? "Free" : "$" + app.price}</p>
      <button onclick="install('${app.plist}')">Install</button>
    `;

    store.appendChild(div);
  });
}

render();

</script>

</body>
</html>
