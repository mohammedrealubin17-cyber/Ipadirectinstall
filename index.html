<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Your Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyBdpU_R65rhoWwfZOhw6D0aYyZRMQZ2XR8",
  authDomain: "ipa-store-6d0b3.firebaseapp.com",
  projectId: "ipa-store-6d0b3",
  storageBucket: "ipa-store-6d0b3.firebasestorage.app",
  messagingSenderId: "814971997334",
  appId: "1:814971997334:web:6d0fbfcc253149b725c6b7"
};

// Init Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📤 Publish app
window.publish = async function () {

  const name = document.getElementById("name").value;
  const iconFile = document.getElementById("icon").files[0];
  const plist = document.getElementById("plist").value;
  const price = document.getElementById("price").value;

  if (!iconFile) {
    alert("Please select an icon image");
    return;
  }

  const reader = new FileReader();

  reader.onload = async () => {

    await addDoc(collection(db, "apps"), {
      name: name,
      icon: reader.result,
      plist: plist,
      price: price
    });

    alert("App published!");
    loadApps();
  };

  reader.readAsDataURL(iconFile);
};

// 📱 Load apps
async function loadApps() {

  const store = document.getElementById("store");
  store.innerHTML = "";

  const snapshot = await getDocs(collection(db, "apps"));

  snapshot.forEach(docSnap => {
    const app = docSnap.data();

    const div = document.createElement("div");

    div.innerHTML = `
      <img src="${app.icon}" width="70">
      <h3>${app.name}</h3>
      <p>${app.price == 0 ? "Free" : "$" + app.price}</p>
      <button onclick="install('${app.plist}')">Install</button>
    `;

    store.appendChild(div);
  });
}

// 📲 Install function
window.install = function(plist) {
  window.location.href =
    "itms-services://?action=download-manifest&url=" +
    encodeURIComponent(plist);
};

loadApps();
</script>
